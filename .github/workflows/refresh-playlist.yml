name: Refresh Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-playlist
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: windows-latest
    outputs:
      changed: ${{ steps.commit_playlist.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build latest playlist
        run: node scripts/build-playlist.js

      - name: Commit refreshed playlist
        id: commit_playlist
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/playlist.json
          if (git diff --cached --quiet) {
            Write-Host "No playlist changes to commit."
            "changed=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          git commit -m "Refresh playlist"
          git push
          "changed=true" >> $env:GITHUB_OUTPUT

  deploy:
    if: needs.refresh.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh

    steps:
      - name: Checkout latest repository state
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
