name: Refresh Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3,15 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-playlist
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build latest playlist
        run: node scripts/build-playlist.js

      - name: Commit refreshed playlist
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/playlist.json
          if (git diff --cached --quiet) {
            Write-Host "No playlist changes to commit."
            exit 0
          }
          git commit -m "Refresh playlist"
          git push
